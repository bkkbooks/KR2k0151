body:
  text: 異域録卷下覺羅圖理琛撰自雅班沁捨舟俱乘騎陸行此間道路甚泥濘一日止可行三十里許地勢漸下皆林藪越九宿于十一日至費耶爾和土爾斯科地方此處俄羅斯謂其國之内地愈加欽敬管柏興官排列旂幟兵丁鼓吹而迎其䕶從官兵按隊層列負鎗持刃送至館驛安置此處一帶山色竒秀室宇清潔土拉河環抱舟楫往來宛如江南應接不暇忘異鄉行路之﨑嶇也費耶爾和土爾斯科城在鴉班沁之西北其間四百餘里無城郭沿途皆山岡多林藪惟有杉松馬尾松楊樺地甚泥濘有小柏興四五處土拉河來自西北流過費耶爾和土爾斯科城之西面向東南而流河之東岸石山上下及河之兩岸有柏興廬舍居七百餘户俱俄羅斯天主堂五座有市㕓設管轄柏興頭目一員駐兵三百名候辦供給止二宿于十四日起程路甚泥濘十八日過費耶爾和土爾斯科佛落克嶺其嶺峰巒競秀泉脈争流夾路野花若張錦綺羅極髙之處亦泥濘有水費耶爾和土爾斯科佛落克嶺在費耶爾和土爾斯科城之西北其間二百餘里山不甚大沿途皆林藪有馬尾松果松杉松楊樺櫻薁刺玫山巔嶺上隨處流泉地甚泥濘上嶺五里許下嶺十里餘自嶺東流出者謂之土拉河嶺西流出者謂之托波兒河俱向東南流過圖敏地方土拉河歸入托波兒河復向東北流至托波兒相對地方歸入厄爾齊斯河又自山陰流出者謂之喀穆河其大似色楞格河水色赤溜急自東北向西南而流至喀山相對地方歸入佛兒格河其嶺之西北有山名曰帕付林斯科峙出諸山土人云冬夏積雪不消人不能至又越七宿于二十五日至宿里喀穆斯科地方沿途皆山林甚泥濘大雪連朝林木巖壑一日皜然瓊瑤璀璨光輝奪目真竒觀也自此由喀穆河水路舟行正在料理船隻于二十七日起又大雪三日河内流澌俄羅斯官來禀曰水路已不能行只得候地凍由陸路方可行走我等向䕶送官博爾果付泥克催促即由陸路起行博爾果付泥克曰其間途中泥濘浮面雖稍凍下面猶陷馬蹄易于損壊雖强為起程不能出一百里倘若阻滯反覺艱難㫁不可行若稍可行走我何敢留天使在此居住只得暫候幾日因此候凍住索里喀穆斯科地方至九月盡間遍地凍結撥給馬匹拖床于十月初二日自索里喀穆斯科地方起程索里喀穆斯科在費耶爾和土爾斯科佛落克嶺之西南其間二百餘里沿途山不甚大地勢漸下俱林藪有杉松馬尾松楊樺地甚泥濘喀穆河于索里喀穆斯科之北二十里外來自東北向西南而流有烏索兒科之小河來自東北由栢興中流出向西歸入喀穆河居五百餘尸皆俄羅斯天主堂六座有市㕓設管轄柏興頭目一員駐兵三百名柏興之西北有鹽塲塲内有方木井四十餘處咸取井水煎鹽其隣近之小柏興亦皆煎鹽莫斯科窪城等處俱食此地鹽越三宿于初五日至改郭羅多地方管柏興官逺出迎接治館驛安置改郭羅多在索里喀穆斯科之西北其間四百餘里喀穆河來自西北遶過改郭羅多向東南而流沿途皆山岡林藪有杉松馬尾松楊樺小柏興六七處俄羅斯與一種别爾馬羈之人雜處柏興之附近皆田畝居二百餘戸皆俄羅斯有天主堂二座設管轄站頭目一員無兵從此處向西北行通莫斯科窪城大路向西南行通喀山大路自托波兒至此處有二千二百餘里從此至莫斯科窪城亦有二千二百餘里别爾馬羈之人貌類俄羅斯言語不同其言語俄羅斯亦不解俱在喀穆河之兩岸居住詢其來歴原係别一部落歸附俄羅斯有年越四宿至索羅博達地方皆林藪河岸之上有廬舍俄羅斯並擄來式費耶忒國人五千餘戸雜處又行一日至黒林諾付地方管柏興官排列旂幟兵丁迎接請至伊家欵宴候辦供給止二宿黒林諾付在改郭羅多之西南其間四百餘里費牙忒喀河其大似色楞格河自費耶爾和土爾斯科佛落克嶺隂發源來自東北遶過黒林諾付向西南而流歸入喀穆河沿途皆山岡地勢漸下隨處皆有小柏興甚稠密田畝亦多遙望林木蒼然居千餘戸皆俄羅斯有市㕓磚造天主堂七座大木營治天主堂五座設管轄柏興頭目一員駐兵三百名産大青兎番名博羅托頼及獺以上俱係西畢爾斯科道所屬地方乃噶噶林馬提飛費多爾委翅統轄十月十五日起程地勢漸下越六宿于二十一日至喀山地方佛爾格河環其右潔治館驛安置夜静登樓逺眺見髙嶢月出萬象澄澈河水漣漪一碧無際遙憶鄉井心神怳然喀山在黒林諾付之西南其間五百餘里佛兒格河其大似鄂布河來自西北至喀山城之西南五里外向東南而流喀穆河來自東北於喀山之東南六十里外歸入佛兒格河沿途皆山岡地勢漸下多林藪有杉松馬尾松楊樺椵柞榆栁波羅荆條有小柏興二十餘處俄羅斯與塔塔拉並一種車爾米斯人雜處其柏興附近俱有田畝喀山左近地勢平坦林木遼逺田畝甚多其喀山係排置大木為城有八門一面二里餘週圍八里餘有郭郭外環城俱以木為鹿角安置城内有市㕓磚造天主堂五座大木營治廟三座居五千餘戸皆用大木營治樓房廬舍有俄羅斯與塔塔拉並車爾米斯及土爾扈特等人居住設立管理喀山斯科道總管顧比爾那托爾官名費多爾薩馬落委翅人名統轄有小頭目十餘員駐兵二千餘名其生計牲畜等項與托波兒同食方木井水有稻稷大麥小麥蕎麥油麥菀豆蘋果沙果檳子松子榛子核桃櫻薁刺玫都克什乏乏哈楂梨厄衣克特克枸奶子蜂蜜水族有鮰魚白魚魴魚鯉魚鯽魚鮎魚鴨嘴魚四帖黒烈帖魚其車爾米斯之人貌類塔塔拉皆削髮言語殊異亦係别一部落原在喀山阿斯塔爾漢等處居住其後俄羅斯侵佔諸處将伊等散處於喀山左近地方併入俄羅斯國有年俄羅斯國法律凡叛逆犯上者将身肢解為四段遇敵敗北者斬其刦奪並路截傷人或殺人者俱斬其互相鬭毆殺人者抵償持刃殺人者抵償傷人者㫁手其偷盜倉庫之官物者視其贓之多寡有劓耳鼻者有重責以火烤而發遣者其私鑄錢者将銅鎔化灌其口内以殺之其私賣烟酒者重責籍其家發遣其因通姦殺死本夫者将婦人之身體埋於地内獨露其首以殺之姦夫懸於樹上以殺之其犯通姦之罪者将婦人重責交還本夫不准離異将姦夫重責復按其罪収贖入官其幼童與女子通姦者俱重責配為夫婦在此處候辦供給止八宿於三十日起程途中越三宿初三日至西穆必爾斯科地方西穆必爾斯科在喀山之正南相去三百餘里佛爾格河來自東北繞城之南面向西南而流沿途地勢平坦俱係曠野無林木田畝甚多有小柏興十餘處俄羅斯與車爾米斯並塔塔拉人雜處西穆必爾斯科有城郭係大木營造小於喀山城皆損壊有八門環城俱以木為鹿角安置城之内外及河岸居千餘戸皆俄羅斯有市㕓天主堂四座設管轄城郭頭目一員駐兵五百名候辦驛馬供給止五宿初九日起程途中經賽斯蘭十二日晩偶遇狂風大作風雪交加撲面不能前進住佛爾格河岸又越四宿于十六日至俄羅斯國界之薩拉托付地方薩拉托付在西穆必爾斯科之西南相去五百餘里俄羅斯與土爾扈特兩國接壤之處佛爾格河來自東北繞薩拉托付之南向南而流水濁溜緩此河俄羅斯國人名曰佛爾格河土爾扈特國之人名曰厄濟兒河沿途皆平坦地方間有山岡地勢漸下林木稀少有楊樺椵柞榆波羅等樹田畝甚多有小柏興二十餘處俄羅斯與車爾米斯並塔塔拉人雜處河之北岸有廬舍居五百餘戸俱俄羅斯其柏興之東北兩面皆山不甚大南面有佛爾格河環流東西北三面俱掘濠其外安置鹿角河内有寛一丈長七丈餘船四五隻寛二丈長十丈餘船壹隻小舟艇五十餘隻有市㕓天主堂六座設管轄柏興頭目一員駐兵二百名有床桌櫈車拖床種大麥小麥蕎麥油麥菀豆麻有稻稷米因問及二米出産之處俄羅斯言稷米乃本地所産稻米本地不出係沙漳汗所屬科索里巴什地方所産皆沙漳汗國阿爾米牙那之貨通人挽運販賣有兩種蘿蔔白菜葱蒜王瓜倭瓜畜馬牛羊猪鵝鴨雞犬猫有一種雞身大似鵝脚髙尾短有蒼黒色而花紋者亦有白色而青斑者俱雄雞之冠不時變幻各色人稍侵之即鳴而舒翼毛羽竪立冠便下垂比户畜之甚多俄羅斯言此聶穆沁地方所産之雞後得種於聶穆沁今蕃息甚多俄羅斯人又呼式費耶忒國為聶穆沁河内有鱘魚鮰魚鯺􅳬魚白魚鰱子魚魴魚鯉魚鯽魚禪魚鴨嘴魚魚四帖里烈帖魚二月下旬雪已消盡佛爾格河氷解釋於三月上旬草即萌木葉發俄羅斯國地方寒而濕雨雪勤多隂少晴幅􅊷遼濶林木蕃多人烟稀少其國俗貴賤難辨其下人毎見尊長皆免冠立地而叩尊長不免冠凡男子或遇於途次及他處每遇皆互相免冠立地而叩男子與婦人相遇男子免冠婦人立地而叩其俗以去髭髯為姣好髮卷者為美觀婚嫁用媒妁聘娶之日往叩天主堂誦經畢方合卺殯殮有棺俱送至廟内𦵏埋起墳墓無喪禮喜飲酒親友至必出酒以敬之不知茶服氊褐苧布以麥麫做餅食亦食各項肉魚不食飯毎食用匙並小又無箸務農者少藉貿易資生者多知種而不知耘不知牛耕沿河近水居住者多喜浴善泅用瓜種大小銀錢有值三文十文五十文百文之銀錢亦有紅銅大錢與小銀錢通用以十六寸為一尺十二兩為一觔千步為一里人性矜誇貪得平居和睦喜詼諧少争鬭好詞訟每逢吉日男子相聚㑹飲醉則歌詠跳舞婦女不知規避争相粧飾各處遊嬉隊行歌與途問及節氣彼云無厯俱與伊俄羅斯佛經内選擇日期不知朔望或二十九日三十日三十一日不等為一月以十二月為一嵗知有四季於康熙五十一年十二月十六日係伊國冬季大齋完日為嵗初二十一日浴佛於五十二年十一月二十七日為嵗初十二月初三日浴佛尚浮屠齋戒之日多自伊國王以至庶民歸入俄羅斯教之各種人及男婦童稚每年按四季大齋四次每季或四十日三十餘日不等平素皆按七齋戒七日内戒肉食二日觀其國俗用度尚儉居處汙濁最尊法令極厭兵戎俄羅斯國向無汗號原避處于西北近海之計由地方而地界甚狹傳至衣宛窪西里委翅人名之時其族内互相不睦以致於亂衣宛窪西里委翅力甚㣲弱乃求助於式費耶忒國王而式費耶忒國王許助衣宛窪西里委翅兵八千並糧餉欲取俄羅斯之那爾瓦城衣宛窪西里委翅從其言将那爾瓦城歸於式費耶忒國因假此兵力衣宛窪西里委翅征収其族類而自號為汗焉迄今三百餘年從此强盛将喀山並托波兒等處地方俱已征獲其後又侵佔伊聶謝並厄爾口泥布楚等地方國勢愈大俄羅斯國現在國王察罕汗之名曰撇忒爾阿里克謝耶委翅年四十一嵗歴事二十八載所居之城名曰莫斯科窪因遣使索取歸於式費耶忒國之那爾瓦城而式費耶忒國王不許遂成仇敵已五十年式費耶忒國王名曰喀魯禄什年三十三嵗所居之城名曰四條科爾那初戰敗俄羅斯國之兵大加殺擄後再戰為俄羅斯察罕汗所敗傷人甚多失城數處以致危急逃往圖里耶斯科國空科爾汗所屬鄂車科付之小城居住已經八年又有名曰米爾竒里斯一小國王先在沙漳汗左近居住係别一部落因協助察罕汗與式費耶忒國交戰被擒察罕汗歸其被擄之式費耶忒國人贖還在途中病故俄羅斯國之西北諸國名目圖里耶斯科式費耶忒博爾托噶里牙付蘭楚斯雅爾馬尼牙宜大里牙宜斯巴尼牙狄音和爾斯提音布魯斯竒博爾斯竒别穆斯竒賽薩林穆斯竒昻假爾斯竒賀蘭斯竒博玻林穆斯竒肆班斯竒南面所有諸國部落名目土爾扈特哈拉哈兒叭哈薩克䇿旺拉布坦布魯特莽武特布哈爾哈薩兒巴什伊爾欽哈什哈兒庫䇿阿克蘇吐爾們沙漳跟隨俄羅斯官博爾果付泥克四鐵班訥委翅差俄羅斯國之通事并管兵頭目馳告阿玉竒汗言天朝使臣已至我界薩拉托付地方駐劄速派官兵預備驛馬供給前來迎接時雪甚大衆不能前進遂駐劄於薩拉托付地方在彼候阿玉竒汗迎接之間乃屬冬令諸人輪流宴飲或㑹司射的或於河岸騎射捕魚以為娯其俄羅斯官所差通事等至土爾扈特國阿玉竒汗聞此信甚喜傳集其部落修治氊帳衣服預備供給俱各停妥候青草發後於五十三年四月初五日土爾扈特國阿玉竒汗差伊部下台吉魏正等恭請至聖大皇帝萬安并問天使無恙於五月初六日渡厄濟兒河因馬駝未齊候駐一日於十八日貝子阿拉布珠兒之父那咂爾麻木差伊所屬之寨桑趙忒覇台吉諾爾木爾金於我四人處各送馬二匹舒哥等四人處各送馬一匹曰我頭目言我子阿拉布珠兒䝉至聖大皇帝沛施恩澤生計饒裕不勝感戴欲往叩謝如天大皇帝闕下並仰瞻金顔奈路途迢逺苦不能至今聞得大皇帝頒發諭㫖欽命天使至此不勝榮幸特差我等前來恭請至聖大皇帝萬安問天使大人無恙並送馬匹我等言爾那咂爾麻木感大皇帝深恩特遣爾等前來恭請大皇帝萬安送我等馬匹甚合禮儀但我等係特差往爾汗處欽奉諭㫖今尚在途中爾汗又預備馬匹乘騎此地並無用馬處爾那咂爾麻木深感大皇帝厚澤遣爾等前來請安送馬之處我等囘日奏聞大皇帝可也将所送馬匹發還二十日起程行十日於六月初一日至土爾扈特國阿玉竒汗駐劄之馬駑托海切近地方阿玉竒汗遣伊部下台吉並畨僧等迎迎導至宿處安置至沿途阿玉竒汗部下台吉並畨僧及歸入阿玉竒汗之莽武特頭目各率所屬人等陳設筵宴排列生畜逺來迎接以及馬前跪獻食物者甚衆皆不勝欽敬至下午阿玉竒汗差伊特近畨僧格瓦等前來禀曰明朝吉日我汗恭請至聖大皇帝諭㫖並㑹天使次早初二日捧㫖前往土爾扈特國台吉畨僧排列前導俄羅斯國官兵隨後擁䕶至阿玉竒汗幄帳切近下馬交遞諭㫖阿玉竒汗跪接北向恭請東土大皇帝萬安畢我等宣㫖曰大皇帝諭㫖問汗無恙欲将爾姪貝子阿拉布珠兒發往使爾團聚詢問俄羅斯國商人科宻薩爾又将阿拉布珠兒之四人調來正在料理恰合朕意爾竭誠特遣使薩穆坦等請安朝覲進貢前來朕甚嘉念於是特選厄魯特之舒哥米斯及我等前來頒發諭㫖恩賞阿玉竒汗不勝感謝讓我等坐其右作樂筵宴阿玉竒汗恭請大皇帝萬夀我等答曰我大皇帝甲午年誕生今年六十一嵗阿玉竒汗又問皇子幾位我等答曰現今已封親王郡王貝勒貝子及常隨大皇帝射獵我等得見者共十六人尚有幾位未出深宫我等無由瞻仰不得而知阿玉竒汗問公主幾位我等答曰已經下嫁我等所知者十數位今宫壼中尚有㡬位亦不得而知阿玉竒汗又問聞得大皇帝每嵗避暑行圍所係何地名相去京師幾多逺近於何時往返我等答曰我大皇帝避暑之處名熱河及喀喇河屯離都城七八日路每嵗或四月盡或五月初起駕立秋後哨鹿完日九月間囘鑾阿玉竒汗問此地山川樹木林藪如何我等言此地在長城邊外有髙山大川水極甘美林木茂盛禽獸蕃息阿玉竒汗又問大皇帝處如何耕種或待雨播種可有水田否我等答曰我中國五榖及各種豆菽無不栽種亦有待雨水播種者亦有水田阿玉竒汗又問大皇帝龍興之處相隔都城幾多逺近人烟多少我等答曰此處名盛京自都城行二十餘日可至彼處人烟稠密設立五部衙門建官管理又安設三将軍彈壓地方阿玉竒汗問滿洲䝉古大率相類想起初必係同源如何分而各異之處大皇帝必已洞鑒煩天使留意囘都時可奏知大皇帝我所遣之人來時将此原由懇乞降㫖明示我等答曰我等留意囘日奏聞阿玉竒汗又問滿洲何以有新舊名色我等答曰初在盛京時扈從太祖皇帝太宗皇帝人之子孫俱稱舊滿洲其在盛京邊界地方居住後因我大皇帝遷居京師者皆係新滿洲阿玉竒汗又問清文與䝉古字有同異否原係何人創制流傳我等答曰清文與䝉古字大相懸異我太祖皇帝始制十二字頭太宗皇帝於字傍復増圏㸃並諧音韻於是千變萬化其用無窮至精至奥阿玉竒汗又問曩時聞得大皇帝國中有一平西王作亂大皇帝𠞰除翦滅係何年叛逆尚有遺孽否我答答曰平西王受我大皇帝隆恩念其少有㣲勞封為王爵安置我中國西南隅雲南地方安享榮華尚不自足竟負恩叛逆我大皇帝赫然震怒遣發禁旅勦除剪滅我中國法律此等負國忘恩之人㫁不留其種類此係癸丑年倡亂平定以來已四十餘年矣我等向阿玉竒汗言來時奉大皇帝諭㫖欲将貝子阿拉布珠兒遣囘與爾完聚若經由䇿旺拉布坦之路䇿旺拉布坦與爾不睦他托言伊西邊哈薩克國哈拉哈兒叭國邀害阿拉布珠兒亦未可定不便由此路遣囘須由俄羅斯國行走方可安妥特命我等㑹同國王定議囘京奏聞再将阿拉布珠兒遣囘阿玉竒汗曰其父兄俱在我一同商酌定議再囘覆天使我等又向阿玉竒汗言我等來已數年幸平安至此已将諭㫖交付國王大事已畢其阿拉布珠兒之事定議後我等即可起行阿玉竒汗曰諾㫁不敢敢久留天使其往返迎送阿玉竒汗皆将伊部下併借來俄羅斯官兵齊集排列放炮作樂越一宿初四日阿玉竒汗之妃達爾馬巴拉邀請作樂筵宴請二新滿洲步射莫不稱善初五日阿玉竒汗差伊侍近之異什來禀稱聞天使内有善射者二人我國王欲得一觀如不棄請往若倦則已我等言有新滿洲二人不過能射而已非善射者爾國王欲觀令其往射於是噶劄爾圖及米邱二人携上賜弓矢前往阿玉竒汗邀其近前列坐獻茶果問二人年庚指盤内歐梨曰中國亦有此果否噶扎爾圖答曰中國有此果品阿玉竒汗又問更有甚果品噶扎爾圖言中國果品最多不可勝數阿玉竒汗又問天使原籍相隔都城幾多逺近噶扎爾圖言自京師乘馬行三個月内可至阿玉竒汗又問彼處寒暑雨雪並山川林藪若何噶扎固圖言我原籍地方夏月不甚炎熱冬月甚寒雨雪不定平素雪積二三尺許雪大之年有四五尺許深山髙峻險林藪森密溪河甚多内黑龍江牛門河最大阿玉竒汗又問水之甘苦噶扎爾圖言河水甘美雖洼處停潦之水亦美無異阿玉竒汗又問河内出何等魚山中有何等獸噶扎爾圖言河内所産之魚種類甚多亦有鰉魚大者有一二丈許其索倫達呼爾人漁捕此魚進貢山内有虎豹熊狼野猪鹿狍堪達韓等獸阿玉竒汗又問可種田地否居何廬舍養何牲畜噶扎爾圖言不種田地以打牲射獵資生無廬舍似爾國遊牧止養馬匹無他生畜於是樹的射箭阿玉竒汗稱善噶扎爾圖言我二人並非善射者方隨衆學射耳大皇帝處執勁弓善射者以萬計阿玉竒汗借弓詳看問曰此弓角係牛角否噶扎爾圖言我中國南方有種水牛此係水牛角阿玉竒汗又問其牛身大幾許是何顔色噶扎爾圖言我大皇帝曽差我往南方湖廣地方因此得見比旱牛稍大其色似駝阿玉竒汗又問大皇帝所執弓式可得聞否亦射鼔的否中的若何噶扎爾圖言弓式大約相同俱擇上等佳角樺皮製造大皇帝不時射鼓的十中八九阿玉竒汗又問中國漢人亦射箭否出征所用器械等物曽帶來否噶扎爾圖言我中國有緑旗兵丁皆漢人駐防各省並巖疆要地頗多善射者大皇帝常調取來京令其勤習騎射以勵人材其行兵所需大砲鳥鎗刀劍長鎗弓箭器械等項甚多我等此來止携有弓箭别項器械俱未曽帶來阿玉竒汗取看稱善阿玉竒汗又問天使原籍以外地方尚有國度否離海洋逺近可曽渡海否噶扎爾圖言我原籍地方以外有必爾拉國役犬國莫尼伊爾及鼓魯伊爾諸部落我所不知部落尚多俱與大皇帝毎嵗納貢東海大洋相隔我原籍有一月程沿海一帶曽往射獵不曽過大洋阿玉竒汗又問聞得中國有屬國名朝鮮者與大皇帝納貢否天使可曽到彼處否噶扎爾圖言朝鮮國係我中國所屬每年貢進方物我不曽到其地是日原厄魯特國玉鄂竒爾圖車臣汗之妻係阿玉竒汗之妹名多爾濟拉布坦邀請作樂筵宴初六日阿玉竒汗之長子沙克度爾扎布邀請作樂筵宴令其䝉古人相角牴請二新滿洲射箭衆觀之咸稱善初七日阿玉竒汗差伊侍近畨僧阿拉穆占巴並格瓦及薩穆坦等前來曰我國王差我等來禀天使我國王常欲遣使恭請大皇帝萬安心中殷殷因南路不通所以數年相隔奉曽遣使近日於俄羅斯國假道特遣薩穆坦等前往請安進貢䝉大皇帝隆恩重加賞賜不以俄羅斯國道路僻逺復頒諭㫖遣天使前來綸音下降捧讀之餘不勝欣躍中心愛戴今我國王復欲遣使前往其繕寫表章欵式我等外夷不通中國禮儀恐不合式或繕寫表章具奏或令使者到日口奏與天使商酌定議而行我等言表奏口奏之處還是國王自行裁酌阿拉穆占巴等又曰天使在薩拉托付地方耽擱情由我國王令我等訴稟天使聞得天使到俄羅斯國邊界薩拉托付地方信息猶不的確後得實信遂即差魏正等前去迎接從前使者凡自俄羅斯國來者皆係俄羅斯國差人送至我國地方其自我國去者我國即差人送至俄羅斯國交付此畨天使來時我以為俄羅斯國仍照前差人送來因此耽誤後又向俄羅斯國借用船隻往返差人往喀山地方去以致遲滯日久我等言此係已往之事今大事既畢畧有遲延無甚大碍阿拈穆占巴等又禀曰戊寅年阿拉布珠兒去時我汗曽遣使厄里克格孫前往請大皇帝萬安進大青馬一匹己夘年到京聞得大皇帝厚賜恩賞遣還不知何故未到途中被何人謀害至今無信我等答曰先年曽聞爾國遣使進貢我等各有所司且年久不知其詳初十日阿玉竒汗又請于是前往言及阿拉布珠兒之事阿玉竒汗曰将阿拉布珠兒作何遣囘之處大皇帝自有睿裁南路㫁不能來如從俄羅斯國行走必假道於察罕汗方可若差人往察罕汗處去必需時日天使必至久待今請天使先囘隨後差往察罕汗去如允我遣使時再行奏聞阿玉竒汗又問曰達頼喇嘛可遣使往來否我等答曰達頼喇嘛不時遣使我等來時途中又遇達頼喇嘛使者阿玉竒汗又曰今道路不通我國人不能達至西藏凡一切藥物甚是難得我於大皇帝懇求一切藥物煩天使留意轉為奏聞我奏表内一並奏請至二位新滿洲天使最善射幸得快覩亦煩奏聞我雖係外裔然衣㡌服色畧與中國同其俄羅斯國乃衣冠言語不同之國難以相比天使返斾時察看俄羅斯國情形凡目擊親見者須當留意奏知大皇帝作何區處悉聴大皇帝睿鑒至遣使往來人數若多恐彼憚煩㫁絶道途我遂無路請安朝覲進貢矣此等情由煩天使留意奏聞我恭請至聖大皇帝萬安我係絶域逺人䝉大皇帝隆恩感戴不盡但願至聖大皇帝萬萬嵗将我此言亦煩奏聞十一日阿玉竒汗並伊妃達爾馬巴拉其子沙克都兒扎布車領敦多布其妹多爾濟拉布坦於我等八人處各送馬一匹外阿玉竒汗又通共送馬七十六匹薫牛皮四百張沙克都爾扎布又送馬七十二匹薫牛皮二百張我等言我等奉大皇帝欽命前來将諭㫖交付不但爾汗喜悦我等亦喜之不盡勝於諸物多矣我等係逺行人爾國固有預備馬匹供用至俄羅斯國有察罕汗馬匹供用其馬匹皮張並無所用處今爾汗感激大皇帝隆恩以我等逺來如此餽送我等若毫不収受恐或見怪可将送我等乘騎各受一匹其餘馬匹皮張一槩璧辭但将爾汗餽送之禮奏知大皇帝可也來使囘覆阿玉竒汗又復遣人懇乞曰大皇帝不棄我汗特遣天使逺來我國並無佳物此馬匹皮張不過畧表㣲誠天使雖無可用處可於途間變價盤費懇乞全収我等言此等餽送物件我中國從無售鬻之理若収受一二件無異全領於是将阿玉竒汗及達拉穆巴拉沙克都兒扎布車領敦多布多爾濟拉布坦所送馬匹各受一騎次日阿玉竒汗以噶扎爾圖米邱善射亦各送馬一匹収受多爾濟拉布坦之女即沙克都爾扎布之妻察罕薩穆送我等馬各一匹曰我父鄂齊爾圖車臣汗在日屢䝉至聖大皇帝眷愛洪恩近日我母多爾濟担布坦感大皇帝從前大徳特遣使請安復䝉大皇帝優加恩賚又念我母舅阿玉竒汗将阿拉布珠兒殊加恩恤我等不勝感戴天使此來並無可送之物各送駑馬一匹並非佳物畧表㣲忱念我父䝉大皇帝眷顧之恩幸乞辱留並懇将我情詞轉為奏聞於是酌議収受其所収馬匹囘至薩拉托付地方俱賞給俄羅斯國通事及䕶送兵丁訖阿玉竒汗季子車領敦多布奏曰我年童穉恭請至聖大皇帝萬安進鳥鎗一桿鳥鎗已交付我使者我無言可奏但願如天大皇帝萬萬年臨御天下我在此朝暮於佛前潔誠禱祝煩天使奏聞於六月十四日返斾阿玉竒汗遣伊台吉達顔寨桑爾追圖率兵䕶送俟渡厄濟兒河辭歸於七月盡至喀山時金飇薦爽草木未凋沿途山色蒼黄丹碧霜葉滿林燦若霞綺真一幅畫圖也土爾扈特國王阿玉竒汗遊牧地方在俄羅斯國界薩拉托付之東南俱曠野西北兩面有佛爾格即厄濟兒河環流東面有宰河環流南有滕紀斯湖厄濟兒河宰河俱向南流歸入膝紀斯湖沿厄濟兒河俱林木有柞楊樺叢栁自薩拉托付以至阿玉竒汗所居馬駑托海地方其間有三道塔爾魯河三道胡班河及塔爾渾並呉魯蘇屯之小河俱向西流歸入厄濟兒河其河澤内産黄蓮白蓮蘆葦蒲其厄濟兒河之西岸自薩拉托付以至滕紀斯湖又有俄羅斯國屬之西拉客穆什城名擦里岑城名噶喇斯諾雅爾城名綽爾諾雅爾城名阿斯達爾漢諸城柏興自城池柏興以至馬駑托海地方西南一帶皆興安山嶺過此向西行百餘里俱係圖里耶斯科國王空科爾汗所屬和邦即莽武特之人居住此種人不時擄掠俄羅斯國與土爾扈特兩國邊境人畜詢問阿玉竒汗遊牧地方之大小據言東西可行三十日南北可行二十日此地産龜蛇蛇身如黑漆於十一月初七日囘至托波兒地方值總管噶噶林往莫斯科窪城去因等候住托波兒地方十二月初五日噶噶林到來初七日差伊所屬俄羅斯官拉里宛窪西里委翅人名來請於是往見互叙寒温噶噶林曰天使途中勞苦凡馬匹供給曾有缺乏處否似此長途想天使未必走過我等答曰途中一切供應並無缺乏亦不甚勞苦去嵗我等自厄爾口地方起程來時沿途雖皆有山巒林藪我等俱舟行不覺自雅板沁地方陸行沿途皆林藪道路狹隘泥濘處甚多我中國並無此等地方亦不曾見我中國地方南至南海東之東海西與西藏之西沙章汗接壤此等地方我國之人皆曽到過惟沙章汗地方未到在北則有爾國地方我等初次到此我中國並無似爾國地方者噶噶林又問天使至薩拉托付地方因何不即往阿玉竒汗處去乃久住薩拉托付地方又不知在阿玉竒汗處曽住幾日我等答曰阿玉竒汗在阿斯達爾漢左近地方居住即欲到彼因雪大難行而阿玉竒汗迎接之人又未到是以久住候青草發出阿玉竒汗遊牧至馬駑托海地方遣人迎接始往在阿玉竒汗地方住十四日噶噶林曰我在三柯忒撇忒爾布爾和城内曽見察罕汗此城原係式費耶忒國地方我察罕征取修葺城池池隨我汗名字呼為三柯忒撇忒爾布爾和此城修葺勝於莫斯科窪城我汗現在此城居住今嵗我汗與式費耶忒國征戰又擄獲船貳十一隻将軍一員兵八百名現今付蘭楚斯諸國俱相援式費耶忒國堅守城池觀此數國之兵人丁强健法度甚嚴毎遇敵必鏖戰毎無退縮之意其土爾扈特國之兵並無紀律遇敵交戰望影即放鎗射箭較近但思逃竄並無抗拒捍禦之能倘若儌倖勝敵惟貪取貨物而已十年前我汗曽借土爾扈特一萬萬隨征将土爾扈特三千兵與式費耶忒國兵三百人對敵終不能取勝曩時我國曽與圖里邯斯科國王空科爾汗搆兵曽取其阿藻城近日我國遣使往空科爾汗講和永不興師議定還其阿藻城其阿藻城東北盡入我國矣噶噶林又問曰中國大皇帝行兵所用器械俱係何項可得聞否我等答曰我中國所用火器炮銃式様甚多弓矢刀鎗等項俱用與敵人交戰度其必中方㸃大炮較近始放鎗射箭至鏖戰時俱用刀鎗必以勝敵為尚稍有退縮者即於陣前梟示雖陣亡之屍法不容失若有失落定行治罪軍法極其森嚴噶噶林曰我俄羅斯國從前亦射箭自從現在之汗莅事以來廢棄二十餘年我等向噶噶林言爾察罕汗春秋幾何承襲幾年爾國歴有幾汗至今共歴年若干答曰我汗今年四十一嵗厯事二十八年曩時我國並未稱汗自衣宛窪西里委翅起始稱汗至今歴二十三代共計三百五十餘載至十三代汗始征取喀山托波兒阿斯達爾汗等處今已一百六十年矣我等向噶噶林言我等奉差事竣欲遣人前往馳奏大皇帝在薩拉托付喀山黒林諾付三處曽向䕶從官博爾果付泥克道及博爾果付泥克云欲先遣人之事闗係重大我不敢當至托波兒地方我總管自有定奪故不曽令我等前往今總管既到我等欲即刻遣人前往馳奏大皇帝噶噶林曰甚是馳奏大皇帝事屬緊要理應作速前往我察罕汗曽吩咐作速送天使至中國去不得遲慢大部來文亦有不可遲滯字樣我等何敢稽遲十七日噶噶林差俄羅斯官拉里宛窪西里委翅請余同納顔前往相㑹噶噶林曰天使初降敝邑我輩或心有不盡禮有不周處亦未可知望乞天使海涵中國人自古從未到我國地方今幸遇天使前來我等不勝歡忭我等答曰往返沿途供應諸項並無缺悞官兵各小心謹慎我等毫無勞苦皆由總管辦理得當之所致也再我等向日但耳聞俄羅斯國地方從未一到今奉大皇帝欽命經過爾國地方得遇伊等亦喜之不盡噶噶林曰我見察罕汗時曽問天使行止我将天使等皆知識髙明曽言汗如欲相㑹我等即往㑹之處告訴我汗又問大部可有印文來否我禀云不曽有文書我汗言今現有干戈之事在式費耶忒邊界地方駐扎欲㑹天使意雖殷篤但無大部文書所以不敢驚動天使若大部有文書到來我雖駐扎逺地任有大事必請天使相㑹矣噶噶林又向我等曰我差官兵直送天使至京師将此䕶送官兵萬望一同偕往不阻邊疆是感我亦移㑹大部其文書業付䕶送官員前往䕶送官兵到彼時令其待後遣䕶送官兵到日同囘可也至天使前往沿途一切馬匹供用等項我皆辦理完備㫁不敢悞十二月二十二日撥給驛馬拖床派出䕶送官兵余同納顔各帶跟役二名自托波兒起行越七宿於二十九日至塔喇斯科地方塔喇斯科在托波兒之東南相去一千二百餘里厄爾齊斯河來自東南向西北而流塔喇河來自東南於塔喇斯科相對地方歸入厄爾齊斯河沿途地平坦俱林藪有杉松馬尾松楊樺榆叢栁櫻薁沿厄爾齊斯河岸皆塔塔拉人居住間有田畝厄爾齊斯河之南岸有廬舍居千餘戸俄羅斯與塔塔拉雜處天主堂六座設管轄柏興頭目一員駐兵五百名五十三年正月十二日起程越十四宿於十五日至托穆斯科地方沿途俱是歸附俄羅斯之塔塔拉並巴爾巴忒之野人居住此處哈薩克圖哈拉哈爾叭國䇿旺拉布坦皆與俄羅斯國連界居人稀少俱食雪托穆斯科在塔喇斯科之東南相去二千五百餘里鄂布河從托穆斯科二百里外來自東南向西北而流俄羅斯呼為鄂布河其巴爾巴忒人呼為牙巴里河托穆河來自東南由西面繞過柏興向西北而流至百里外歸入鄂布河自塔喇斯科三百里内皆林藪有杉松馬尾松楊樺榆叢栁櫻薁俱俄羅斯居住間有田畝從此至鄂布河沿途地甚平坦惟樺木片片叢生甚稀生蘆荻處甚多有水澤無溪澗此處塔塔拉與巴爾巴忒兩種人雜處夏秋則飲澤中及低窪處潦水冬春則食雪冰俄羅斯哈薩克國哈拉哈兒叭國䇿旺拉布坦四國連界接壤此處所居塔塔拉並巴爾巴忒人與俄羅斯䇿旺拉布坦兩國皆納賦不時被哈薩國人侵奪擄掠掠自鄂布河以至托穆斯科沿途皆林藪有杉松馬尾松楊樺榆叢栁櫻薁俄羅斯與塔塔拉人間有田畝托穆河東岸有廬舍居千餘户俄羅斯與塔塔拉並貨通及克爾紀斯厄魯特各種人雜處柏興左近地方田畝甚多天主堂十座設管轄柏興頭目一員駐兵五百名自托穆斯科往伊聶謝來向東北行其間一千六百餘里其楚里穆河自麻科佛斯科山内發源向西南歸入鄂布河沿途俱林藪有杉松馬尾松果松樺楊叢栁櫻薁刺玫托穆斯科百里以内有小柏興四五處俱俄羅斯間有田畝楚里穆河岸藪内皆係塔塔拉人散處甚稀捕灰鼠銀鼠狐狸納貢伊聶謝二百里以内皆山林有小柏興六七處俱俄羅斯間有田畝越十五宿至伊聶謝柏興候辦驛馬供給止二宿於二月初四日起程又行十日至伊里穆城伊里穆城在伊聶謝之東南相去二千餘里沿途俱山林有嶺亦由通古斯河舟行陸路亦通伊里穆城似柏興四面皆山林有杉松馬尾松楊樺叢栁櫻薁其伊里穆河來自東北環流伊里穆城歸入通古斯河伊里穆河北岸有廬舍居二百餘户俱俄羅斯有天主堂二座設管轄柏興頭目一員駐兵二百名自伊里穆城往厄爾口城向東南行其間千有餘里沿途皆山林有嶺亦由昻噶拉河舟行陸路亦可行五十四年三月二十七日至京師往暢春園陛見将奉差往返諸事面奏上大悦深加褒奨俯降温綸頒賜御膳具奏疏曰為欽奉上諭事臣等於康熙五十一年五月二十二日自京師起程於七月二十三日至俄羅斯國邊界楚庫栢興地方管理栢興之俄羅斯頭目衣宛薩委翅聞得中國至聖大皇帝欽差天使即撥官兵船隻迎接至栢興地方諭㫖前排列兵丁數隊導引至公署安歇俄羅斯頭目言兩國和議年久我國人不時前往中國沾至聖大皇帝深恩天使前來理應即便送往但天使此來業已往報察罕汗囘信未至難於起程暫請少待於是臣等住楚庫栢興地方候察罕汗信到五十二年正月十四日察罕汗文到厄爾口城差俄羅斯官按叠列衣阿法那西委翅前來迎接問其來官答曰䝉我頭目差遣命我謹慎欵待迎接至聖大皇帝天使來文我不曽見其中情由不得而知臣等於正月十二日自楚庫栢興起程途行十日於本月二十五日至厄爾口城其頭目費多爾衣宛薩委翅人名排兵列幟鳴炮放鎗鼔吹迎接本日即欲起程費多爾衣宛薩委翅言只令我迎接天使至此居住待托波兒差官迎接到日方可起程二月二十日由托波兒特差官博爾果付泥克四班訥委翅前來臣等即欲起程博爾果付泥克曰今陸路泥陷難行人烟㫁絶馬匹不能繼續我總管吩咐将天使大人由水路接來於是臣等候噶昻噶拉河氷解釋於五月初四日自厄爾口城起程途行三個月於七月初四日至托波兒地方噶噶林馬提飛費多爾委翅排兵列幟迎接諭㫖前排列兵丁數對導引官員䕶從送至公署安歇噶噶林相見即持臣等手恭請至聖大皇帝萬安畢盛稱兩國和議之後我國人屢䝉大皇帝隆恩不勝感戴欵待極其欽敬至沿途所過城堡官員迎接亦皆排兵列幟鳴炮放鎗鼔吹不勝欽奉所至地方縉紳耆老莫不進獻食物瞻仰叩謁皆向臣等稱頌至聖大皇帝仁恩盛徳臣等伏以俄羅斯國乃西北遐陬荒裔自古未通中國史籍所不載中國人民未曽一至其地我皇上文徳覃敷神威丕顯恢宏八極撫乂萬邦俄羅斯始通中國自未定邊界之前數十年來深仁厚恵淪浹已久屢洽以仁徳俾沾實恵俄羅斯舉國皆傾心向化噶噶林不勝欣感遂即撥給船隻増添官兵令作速送至阿玉竒汗處謹慎欵待一併同囘臣等於七月十二日自托波兒起程途行四月有餘十一月十六日至俄羅斯土爾扈特兩國交界之薩拉托付地方因雪大暫止其地五十三年四月初五日土爾扈特國阿玉竒汗差部下台吉魏正等迎接至俄羅斯國之薩拉托付地方臣于五月十六日渡厄濟兒河二十日起程沿途經過地方阿玉竒汗部下台吉畨僧及投入阿玉竒汗之莽武特頭目各率所屬人等排列笙畜迎送筵宴馬前跪獻食物皆不勝欽敬途行十日於六月初一日至阿玉竒汗駐扎之馬駑托海地方阿玉竒汗遣部下畨僧台吉寨桑等迎接導至公署下午阿玉竒汗差畨僧格瓦等前來稟稱明日吉辰恭請大皇帝諭㫖次日臣等捧㫖前往土爾扈特國台吉畨僧前導俄羅斯國官兵隨後擁䕶至阿玉竒汗帳幄前下馬交付諭㫖阿玉竒汗跪接恭請東土大皇帝萬安畢作樂筵宴排列部下及俄羅斯國官兵放炮迎接臣等伏以皇帝徳並乾坤明同日月山陬海澨俱登袵席之安絶塞窮荒共享平成之福興滅繼絶濟困扶危凡兹綏輯逺藩聖恩真同髙厚是以土爾扈特國阿玉竒汗聞之不勝感激竭盡悃誠遣使修貢皇上仁恩廣布霈澤周行遣臣等頒發諭㫖並賜恩賞阿玉竒汗愈不禁欣感之至上言臣生長外國夐逺天都竊承皇帝至聖至明徳猷宣著傾就日之誠欲覩天顔而身不能至展朝天之欵遣使入覲而道路難通中心怏怏寤寐不安近日從俄羅斯國察罕汗假道竭誠遣使請安以土毛㣲物䖍修進貢復䝉至聖大皇帝不棄曲加優賜深荷寵耀不以俄羅斯國僻逺欽命天使頒發諭㫖舉國増輝山川生色捧讀之餘不勝欣躍五内融化臣幸屬籍中華得䝉如天大皇帝恩寵山髙海深天覆地載惟願至聖大皇帝萬萬嵗䖍誠禱祝而已此外更無他語臣等在阿玉竒汗地方住十四日筵宴四次餽送馬匹臣等於六月十四日起程恭惟我皇上徳合天地道秉中和仁風翔溢乎垓埏教澤覃敷於遐邇闢千萬年聲教未及之疆土服從古法法令不至之人心神武丕昭而版圖増廓聖恩逺播而藩服欽崇四海而遙六合以内凡懐徳畏威諸國莫不梯山航海羅拜彤廷舉含生載氣之倫悉皆納貢獻琛争來重譯此皆我皇上至徳浩蕩逺超萬古神功髙邁獨冠百王是以致此郅隆之治極盛之時也臣等生際昇平幸叨頒賞絶域之鉅典仰頼至聖大皇帝威福經厯諸國皆以臣等中華天使畏服欽敬臣等咸獲莫大之榮罔知所措曷勝踴躍欣忭之至謹具奏疏及沿途山川形勢恭繕黄冊輿圖進呈御覽為此謹奏請㫖奉㫖知道了該部知道冊圖留覽奉差前往之時家君年已六十有九往返三載餘以暨還都䝉聖恩闔門清泰歡欣團聚夏四月初旬仰感聖主再造之恩生全之徳懇請隨駕避暑効力前往熱河值征勦逆冦䇿旺拉布坦有事之際兵部臣不以余愚䝉庸劣具疏題請調補兵部員外郎辦理軍務屢次入直内廷及陛見奏對咸沐不次之奨諭獲格外之恩綸又特㫖差往俄羅斯國界二次焉時夏六月因大兵四路進𠞰逆冦令余曉諭俄羅斯國特㫖遣往余至楚庫栢興地方遺書於俄羅斯國總管噶噶林馬提飛其詞曰中華至聖大皇帝使臣賜内閣侍讀品級圖里琛致書於總管西畢爾斯科地方噶噶林馬提飛費多爾委翅别來無恙余奉大聖皇帝欽命遣往土爾扈特國阿玉竒汗之時經過爾國地方二載餘沿途供給極其豐裕役馬舟車並無貽悞至托波兒時爾輸誠竭敬列幟排兵致迎迓之禮邀請筵宴殫地主之誠及所厯城堡頭目官員皆排兵迎送甚屬欽敬遣官兵以逺迎至阿玉竒汗而䕶送特令衣宛薩委翅率領兵丁送至京師爾之恭敬恪篤盡禮合儀諸懿行余囘都俱奏聞至聖大皇帝謂爾國與厄魯特人逈異秉心誠實係禮義之邦我至聖大皇帝深為嘉悦特勅理藩院其前來䕶送衣宛薩委翅及官兵抵都時一切供給皆從優裕復賜恩賞衣宛薩委翅等俱無恙勿容顧慮務令其安泰而囘今因公務復臨爾境自别後倐忽一載想念殊深不能面叙特致書存問曩者䇿旺拉布坦不時遣使入覲進貢方物我大皇帝亦甚加憐恤屢頒恩賞通使往來已有年矣我大皇帝至仁性成臨御萬方凡有血氣者皆欲使享昇平𠞰滅噶爾丹之後其準噶爾部落人民應屬我國我大皇帝明知不納聴其在彼以遂其生計但欲率土人民各獲生全同享雍熙雖洞悉䇿旺拉布坦勢力凋敝窮迫已極我大皇帝不忍征伐豢育至今其䇿旺拉布坦賦性奸偽背恩寡信率土之國無不知者葢其天性使然終莫能悛即今言之爾國之塔喇斯科及托穆斯科邊陲地方居住之巴爾巴忒並塔塔拉人等歸附爾國已久彼猶勒取貢物其已歸爾國之貨通人等彼復屢次遣使索取又邀奪爾國貿易之人羈留數月其後得脱往我國之西寜貿易囘時不敢往䇿旺拉布坦路行走請路于我國乃特遣人送至楚庫地方至于鹽塲屯兵狂悖妄舉諸事其不道無知昭然可見矣近者䇿旺拉布坦不自量力不度其醜類罹灰燼之禍乃敢潜遣賊衆侵我邊隅囘子所居之哈蜜地方伊所遣二千厄魯特人為我國二百漢兵數名􅉰子擊敗三四次䑕竄我國封疆大吏将此事奏聞我大皇帝特㫖酌調邊兵并派喀爾喀兵現今聲罪致討如䇿旺拉布坦部下有流竄逃亡者令爾邊境之人即行収納我國並不討取雖經大部移㑹但兩國和議交好有年與子得以相識其西畢爾斯科地方事務俱係爾統轄諸事得以専主我所深知者其収納䇿旺拉布坦逃亡之事當深為留意今奉命之便将我大皇帝至聖至仁率土生靈咸欲置之袵席㫁不興無名之師不伐無罪之國今不得已聲其罪而遣旅致討特致書悉焉兹因麟鴻之便用展眷慕之懐遺幣四端異域録卷下
