body:
  text: 異域録地理類十外紀之屬提要臣等謹按異域録二卷國朝圖理琛撰圖理琛姓阿顔覺羅氏先世葉赫人由考取內閣中書官至兵部職方司郎中是編乃康熙五十一年五月圖理琛以原任內閣侍讀奉命出使土爾扈特由喀爾喀越俄羅斯國至其地五十四年三月回京師復命因述其道里山川民風物産以及應對禮儀恭呈御覽冠以輿圖次隨日紀載見聞其體例略如宋人行記但宋人行記以日月為綱而地理附見此則以地里為綱而日月附見所載大聚落皆為自古輿記所不載亦自古使節所未經如史記述胸奴北海頗作疑詞故儒者類言無北海今據圖理琛所記知伊聶謝相興距北海大洋一月餘程又唐書稱薛延陀夜不甚暗猶可博奕僅得之於傳聞圖里琛以五月至其地知夏至前後確有是事皆我聖祖仁皇帝德化覃敷威稜震疊故軺車所至莫不具郵傳供芻糈涉越三四萬里如行閨闥故得以從容逰覽見所未見聞所未聞纂述成編以補亘古黃圖所未悉今備録其文使天下萬世知聖化彌綸迥出於章亥所步之外且所載俄羅斯土爾扈特畏懷恭頔之忱尤足見堯天丕冒砥屬無垠凡在方趾圓顱無不鱗集仰流效誠恐後為三五以來所未有今土爾扈特已全部內附而所記俄羅斯南路十四國乾隆己亥以後又已盡入版圖併以見武烈文謨顯承啓佑所由拓億􅑤之丕基者非偶然也乾隆四十六年十二月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀
  hash: sha256:3660a18a2156bcc3157b71df327fcf0f7b843faa8bc79b2ea904fd8e08215efd
