body:
  text: 欽定四庫全書異域録卷上覺羅圖理琛撰原任內閣侍讀調補兵部員外郎又特恩升授職方司郎中圖理琛本葉赫人阿顔覺羅氏始祖在葉赫國時行髙望重其國主待以賔禮東北方乃龍騰鳯翔之地天命屬與大清而大聖人出焉統馭寰區撫又六合於未定鼎之前緣盛京諸部落人民酋長輸誠向化歸仁恐之際遽沾髙厚深恩世受國祿官誥相承余生於康熙丁未嵗少時家貧質弱多病稍長雖習讀清漢不甚通曉翻譯平平由例監廷試選取翻繹綱目越一載考授內閣撰文中書舍人厯俸十載之餘奉命散賑山陜兩省饑民察看南河監製綿甲頒賜詔書較俸升授中書科掌印中書舍人引見之日適值內閣票簽侍讀缺出閣臣保題恩准從優升授內閣侍讀又奉命監督蕪關稅課差竣旋都未幾授管理禮部牛羊羣事務總管才識庸劣不能仰副我皇上揀用深恩譴責罷斥於是退居林麓躬事隴畝承歡膝下七載有餘期保天年乘化歸盡生際盛世值遣使海外絶域土爾扈特國巨典因感戴國恩仰圖報效具呈叩請遴選引見聖德廣運咸沐生成復䝉聖恩俯賜原官品級優加賞賚特命前往於康熙五十一年四月二十二日恭請聖訓奉㫖爾等到彼問阿玉竒無恙欲將貝子阿拉布珠兒遣回與爾完聚調阿拉布珠兒人來問俄羅斯國商人科密薩爾官名正在料理遣發恰合朕意伊竭誠差薩穆坦等請安進貢朕甚嘉憫特選厄魯特舒哥米斯及我等各項人前來頒發諭㫖並賜恩賞至于阿拉布珠兒歸路業遣侍衛祁里德前往䇿旺拉布坦處計議尚未到來如到時移㑹爾等彼若言欲㑹同夾攻相圖䇿旺拉布坦爾等斷不可應允但言䇿旺拉布坦與大皇帝甚是相得不時遣使請安入覲大皇帝亦時加恩賜雖其勢力單弱窮迫已極我聖主斷不征伐此事甚大我等未便相允爾雖將此事奏請聖上以我等思之我皇上但願天下生靈各享升平斷無搖撼䇿旺拉布坦之意此事我等可保爾等往見阿玉竒亦照見䇿旺拉布坦禮相待如有餽送爾等酌量收受至往返之時俄羅斯國察罕汗倘遣使𣣔㑹爾等即往相㑹或俱往相㑹或著幾人見聽其來言著納顔圖理琛並新滿洲二人去見若彼不欲見不使人來請則已至相見禮儀依彼國禮見之可也更須向其使言從前爾國尼果賴人名到中國時行止悖戾我等斷不若此見察罕汗時如問中國何所尊尚但言我國皆以忠孝仁義信為主崇重尊行治國守身俱以此為根本雖利害當前亦固守此數者寧死弗憚不渝其道即今人各有祭祀禱祝之事然身不行善不以忠孝仁義信為根夲雖祈禱何益我國咸以忠孝仁義信為根夲崇尚尊行所以我國無干戈無重刑安享太平已久如問生計爾等但言隨處皆同富者亦有貧者亦有且數年前聞得俄羅斯國與其鄰國不睦互相攻伐俄羅斯國欲調用邉兵或疑我邉人不行調撥亦未可定兩國和議年久朕無他意有調用邉兵之處即行調撥不必疑惑等情特諭黑龍江將軍由泥布椘城移㑹爾國如問年髙之人爾等即告以我皇帝每嵗查取年髙之人每次查得一百餘嵗者二三十人九十餘嵗者或一省有萬餘人俱加恩賜如問出獵行幸之處爾等即告以我皇帝每嵗出獵其所扈從兵丁俱給與官養馬匹乘騎按日給與盤費今日下令明日起行不致些毫遲悮一應用度俱係官給惟隻身效力毫無拮据即我等此役乘騎用度皆係皇上恩賜我等但隻身效力耳朕思俄羅斯國必言及火炮之類倘若懇求爾等言路途遙逺難於行走沿途皆髙山峻嶺林木叢藪險隘之處甚多我中國並無如此地方亦不曾見如此道路致之甚難且中國法禁凡火器物件不許擅自出境法令森嚴雖我皇上恩賜斷難至此伊若求爾等轉奏爾等只言我等俱係特遣往土爾扈特國阿玉竒汗處去奉使之事各異此等情莭難於奏聞至俄羅斯國習尚矜誇必出陳其所有之物以示爾等倘若出視爾等不可驚訝亦不可輕藐但言此等物件我中國或有或無我等職司各異有我所見而衆未見者亦有衆見而我未見者所以不能盡知此役爾等同心合意而行不可飲酒無狀嚴禁隨役沿途以至俄羅斯國地方風俗甚壞婦女不端者多爾等隨役不可無禮妄行須嚴加約束至俄羅斯國地方或見婦人或遇可哂之事爾等須莊重行事不可輕於戲謔若餽送爾等物件毋遽收受必須冉三却辭但言我等不曽帶得佳品送察罕汗汗所餽遺如何收得倘冉三懇乞或止收一二將爾等帶去錦縀回送察罕汗但言路途遙逺不曾帶得佳物此係相見之微儀若不來請見或差人到時即將所帶錦縀給與亦言路逺並無佳品些須薄物聊表微意耳及俄羅斯國法令嚴峻屬下人役少有過愆不可表暴於管轄之人務必寬裕莊重而行若問爾等係何官職但言我等係外部院衙門所司官員並非皇上侍近之臣此役俄羅斯國人民生計地理形勢亦須留意欽此內閣編撰頒發阿玉竒汗敕書已成支取驛馬護送兵丁於壬辰年五月二十日自京師起程是日老父率諸兄弟並親友出城餞送不忍遽離在北極寺久坐將暮不能逺去宿於沙河行六日出張家口於六月初二日越興安嶺至正黃旗察哈兒哈穆虎地方察哈兒䝉古官兵預偹駝馬氈帳供給羊隻迎接自此處將內地所乘驛馬並護送緑旗兵丁俱發回又行十餘日至喀爾喀阿拉布坦王所屬巴顔布拉克地方喀爾喀官兵預偹駝馬並供給羊隻迎接此處係興安之上有一帶石山産金桃皮樹又行二日至西拉布里度地方有十餘里沙岡十六日至瀚海之南界阿爾哈林圖枯布爾地方十七日至瀚海適中朱爾輝地方此處産各色小石有查克木樹叢生其木髙五尺許皮似暖木葉似三春桞質甚堅其地方有流泉二三處流聚成小澤水清而甘有水禽集其中覩此忘其為瀚海而目為內地焉十八日至浣海之北界哈囊布拉克地方又行三四日至那拉忒赤勞地方其地皆曠野四望無際惟此有山一處甚竒異周圍十餘里其山之石蜿蜒層疊形如盤蛇猶人力為之者山之下有流泉其南十里許烏那斯太地方産黑白二種英石余見而愛之忘其䭾載重纍擇其佳者十餘塊置布袋內交付台吉萬舒克收貯又行三日至達布蘇台地方貝勒旺扎爾迎接請皇上起居設幃帳宰牛羊筵宴觀隨往新滿洲步射送十餘里辭歸又行三日地勢漸下七月初三日自鄂什欣布里度地方下興安嶺北界至汗山東邉枯爾布里度地方其東南二十里許即勦滅逆賊噶爾丹之召磨多地方在大路傍俱平坂小山谷中樹木叢生有小溪沿山麓川谷紆回而流初五日至土喇河岸因連朝隂雨河水泛漲既無舟楫難于涉渡俟水勢稍落駐宿三日於駐宿無事之暇往釣河濵獲樺魚􅳬魚十數尾皆二尺許命烹之以飼衆極其肥美又遣噶扎爾圖往汗山用鳥鎗捕得大鹿一隻分而食之土喇河自根特山右發源向西流入杭愛汗山流出之鄂爾渾河根特山之左流出之河名曰黑魯倫向東流入呼倫湖自呼倫湖流出之河名曰額爾古納向東北流入黑龍江其鄂爾渾河環流哲布尊丹木巴呼圖克圖所居之布隆汗山及圖謝土汗遊牧地方向西北流入色楞格河自此而北以至俄羅斯國界皆山土喇河北岸諸山有色爾畢谷口三處及松吉納山嶺三處有極髙危險之處亦有峯巒聳峻之處谷內之草暢茂野卉爛漫鋪地如畫鮮耀奪目其山之隂皆叢林有杉松馬尾松楊樺樹極其森鬱其間自各山發源流入土喇鄂爾渾色楞格河之小河則有博羅哈拉席喇伊魯爾伊邦等河其水清而溜急兩岸皆叢桞産樺􅳬鯉鯽鱓鮰等魚又行十日至喀爾喀之北界車陵扎布部長之邉界博拉地方兩傍皆山鄂爾渾河來自東南向西流入色楞格河色楞格河來自西南環繞山北向東北流過俄羅斯國界之椘庫柏興又向北流入柏海兒湖其博拉地方皆草墩甚泥濘潦水成澤其東南林木森密望之鬱然多蚊虻賴嚮導指引而行又行一日至兩國接壤之蘇布克圖地方兩傍皆山林谷中有溪河北山之上有泉其水甘而凉谷內之草暢茂蚊虻甚多揮之不暇跟役人等片時被嘬面目皆腫又越二宿于二十三日至椘庫柏興相近色楞格河之南岸駐扎管理椘庫柏興俄羅斯官衣宛薩委翅人名差人問曰爾等係何人往何處去我等回言是中國至聖太皇帝欽差天使前往土爾扈特國阿玉竒汗處頒發諭㫖並䝉恩賞賜我等凡我等所來情由爾國之貿易商人科密薩爾儘知爾頭目問他即便得知于是衣宛薩委翅即遣官兵撥船隻迎接至椘庫柏興將到時諭㫖前排列十數對兵丁引導送至公署安歇後衣宛薩委翅來見問曰天使之來有河事故有干我國之事否我等答曰我等係特差前往土爾扈特國阿玉竒汗處去的使者於爾國並無甚事因阿玉竒汗特遣使恭請我至聖大皇帝萬安進貢方物由爾國經過爾國特差人轉送至我中國所以我大皇帝亦由此路差我等前來時我大皇帝猶恐從爾國經過沿途馬匹供應不能接濟騷擾爾等特宣㫖大臣傳詢爾商人科密薩爾爾科密薩爾云一應馬匹供應斷不致悮因此方遣我等前來衣宛薩委翅曰我國人每年往中國貿易屢䝉至聖大皇帝深恩天使此來一切馬匹供應豈有遲悮之理但天使前來情由業已差人報知我國察罕汗至今回信未至我等未奉我汗之言不敢擅令天使前往只得暫駐俟我察罕汗信到方可前往因此在椘庫柏興地方俟察罕汗信一住五箇月零三日其間衣宛薩委翅甚是欽敬不時備宴延請餽送食物給與縀四匹五十二年往京師貿易之科密薩爾哦佛那斯夜委翅人名至椘庫柏興于我四人處各送白狐皮三十張並果品等物我等言來時䝉我大皇帝恩賜一切所用什物俱已全備並無缺乏爾科密薩爾亦係行路之人何勞如此餽送璧辭科密薩爾遣人復懇曰我等不時往中國貿易屢沾至聖大皇帝深恩有年天使並不曽到我國地方今既幸遇雖盡心恭奉猶為不足伏乞辱納冉三懇乞我等言科密薩爾既如此說將食物收受其狐皮發回告爾科密薩爾我中國向來凡奉君命差遣人員一切禮物毫不敢受我等日後相見處甚多彼時各自盡心亦未為晚目下毫不敢受却其狐皮答以果餅五十二年正月十四日察罕汗信到厄爾口城頭目費多爾衣宛薩委翅人名差伊俄羅斯官按叠列衣宛薩委翅人名前來迎接問其來厯答曰因托波兒總管噶噶林姓氏移㑹厄爾口城頭目所以我頭目差我前來迎接至聖大皇帝天使令我用心敬奉不可輕慢來文我不曽見其中情由不能得知于是椘庫柏興官衣宛薩委翅撥給拖床七十餘輛並銀隨兵丁敕書前排列伊國旗幟兵丁引導擂鼓放炮相送于正月十六日自椘庫柏興起程椘庫柏興係俄羅斯國界相隔我國喀爾喀部長台吉車陵扎布之邉界博拉地方二百餘里其間皆山不甚大沿途皆林藪惟有杉松樺樹而已色楞格河寬四五十丈不等水清溜急自西南向東北而流楚庫河來自東南流至柏興之南十里外歸入色楞格河沿岸皆叢桞櫻薁榆樹二河交滙處有俄羅斯收貯貨物倉房十餘間居舍數間皆樓房用大木營治河內有􅊑二十餘隻其船頭聳尾齊寬丈餘長七八丈不等自二河交滙處以北十里外色楞格河之東岸有大木營治樓房百餘間無城垣四面皆山此處俄羅斯與䝉古人等二百餘户相雜散處有天主堂三座小舟艇數百隻設管轄柏興頭目一員駐兵二百名器用有床桌凳車拖床畜駝馬牛羊犬雞猫種大麥小麥蕎麥油麥有兩種蘿蔔蔓菁白菜葱蒜山中有熊狼野猪鹿狍黃羊狐狸灰鼠白兔河內有鮰魚鯺􅳬魚哈打拉魚他庫魚鯉魚石班魚穆舒兒呼魚鯽魚松阿打魚禪魚勾深魚牙魯魚一種魚俄羅斯呼為鄂莫裏大似牙魯長尺餘於白露後五日內由柏海兒湖逆流而來甚多俄羅斯國人各行海捕醃以度臘鯺􅳬以此魚為食相繼而來其色楞格河於十月中旬始凍途中行二日於十八日至烏的柏興管柏興官排兵列幟迎接訖設宴欵待深加欽敬出其妻子獻酒作伊國之音樂跳躍以為娛烏的柏興在椘庫柏興之東北相去二百餘里山髙大多林藪色楞格河邉寬濶之處間有田畝色楞格河自西南流過柏興相西北而流烏的河自東南來於柏興之西繞流歸入色楞格河四面皆山無城垣此處俄羅斯與䝉古人等二百餘户雜處駐兵二百名設管轄柏興頭目一員有天主堂二座其廬舍生計牲畜與椘庫柏興同一種石片其大如掌層叠而生人皆按層揭取而用視其所揭石片薄而透明似玻璃琉璃之類俄羅斯國人所居廬舍之窗牖皆以此石片合釘為之問其所出言有一費提穆河自根特汗山之隂流出由巴爾古西穆城之東繞過昂噶拉河源歸入朱爾克河其沿河山內産此石片莫斯科窪城托波兒等處皆用此石又越三宿於二十一日至柏海兒湖之南岸博索爾斯科地方沿途皆大山林藪路傍俱田畝此間有則陽海及哈拉果兒兩村落皆俄羅斯居住不甚稠密其柏海兒湖周圍諸山連繞四面菁葱嵐氛杳靄林木蒼鬱波浪浩瀚極目無際柏海兒湖自烏的柏興向西北行三百餘里方至沿途皆大山林藪其間有小柏興六七處間有田畝柏海兒湖南北有百餘里不等東西有千餘里四面皆山色楞格河自西南流入其巴爾古西穆河自東南流入從東北流入又有一河名曰昂噶拉河鄂遼漢洲居北海兒湖內之東北濶五十餘里長二百餘里其洲之上有山岡産杉松榆樹叢桞並各種野獸布拉特䝉古五十餘户遊牧于此畜牛羊馬匹柏海兒湖內産各種魚及獺于十二月下旬氷始結實人方行走三月盡氷始解柏海兒湖之西北流出一河亦名曰昂噶拉河向西北而流兩岸皆大山林藪約行五十餘里皆山岡川谷寬濶二十二日至柏海兒湖之北岸果落烏斯那地方又越三宿於二十五日至厄爾口城其頭目排列旗幟鳥鎗鼓吹而迎鋪設公署欵留安歇即欲起程費多爾衣宛薩委翅曰我國總管噶噶林來文只教將天使等接來此處居住總管之言如此我不敢少違俟托波兒處特差迎接官員到日方可起行於是因候迎接官到駐扎厄爾口城費多爾衣宛薩委翅備宴延請於官給之外又送牛豕我等言爾國察罕汗供給之物甚是豐裕不可勝用頭目又何必如此餽送却之費多爾衣宛薩委翅曰自兩國和議以來我國人民䝉至聖大皇帝恩澤甚多天使從未一至今逺降敝處並無佳品可獻此些微之物乃奉敬天使微忱念我國察罕汗望乞辱留冉三懇求遂俱受之酬縀二匹厄爾口城頭目不時邀請㑹同射的每遇天氣晴朗之時即出城外騎射捕魚以適懷二月二十二日托波兒處噶噶林差迎接官博爾果付泥克官名四鐵班訥委翅人名至即欲起程博爾果付泥克曰今河氷未泮舟不能行陸路泥陷人烟斷絶一切馬匹供用難於置辦斷不可行我等言奉君命差使豈憚勞苦况我中國凡奉差人員俱以急速為務我等在椘庫柏興地方已住五月有餘在此又久候爾等今爾已到即可起行若途中不得供用之物即於此處携帶乾糧可食倘不得馬匹雖步行幾日亦可只管久住非行路之計於我中國之例甚屬不便博爾果付泥克曰我國總管噶噶林分付將天使大人由水路接來須深加欽敬不可少有怠忽怎敢違拗稍有違拂我身首難保于是住厄爾口城候昂噶拉河氷解一日博爾果付泥克四鐵班訥委翅來見問中國至聖大皇帝建都中華幅􅊷遼闊四面皆有人民周圍國度甚多我俄羅斯國偏僻一方止兩面有國度爾中國何以無干戈之事極其奠安我國戰爭之事總無休息此係何故我等答曰我大皇帝聖德廣運愛民如子凡有血氣者俾皆得生計不分內外逺近一視同仁遍施恩德好生如天無重刑不嗜殺繼絶世舉廢國膏澤洽於海外所以天下諸國皆感仰我至聖大皇帝深恩心悅誠服是以永無征伐之事常享升平之福已久博爾果付泥克曰然我俄羅斯國風俗殊異務虛好勝所以兵甲無休息之日至今戰爭不已三月二十五日昂噶拉河氷解我等催促起程費多果衣宛薩委翅及博爾果付泥克四鐵班訥委翅曰自此往托波兒去向西北行此處氷雖稍解自此以北尚未全泮現今斷難起行我國地方我等􅋀知如可行時何敢耽悮四月十五日修葺船隻起至月盡完備撥給船四隻排兵列幟鳴炮放鎗鼓吹而送于五月初四日自厄爾口城起程厄爾口城在北海兒湖之西北相去一百五十餘里沿途及附近厄爾口城之山不甚大皆平坂山岡昂噶拉河來自東南繞過厄爾口城西向西北而流厄爾口河來自西南入昂噶拉河無城垣似柏興居住八百餘户皆樓房俱係大木營治大半俄羅斯䝉古人少有天主堂五座有市㕓厄爾口城及附近小柏興地方皆屬厄爾口城之頭目斯多爾尼科官名衣宛薩委趐繞轄駐兵五百名器用有床桌椅凳車拖床船舟艇水磨樂有鼓鐘木笛哨呐銅絃筝胡琴産紵麻布燻牛皮種大麥小麥蕎麥油麥麻蘿蔔蔓菁白菜葱蒜畜馬牛羊豕雞鴨犬猫食方木井水河內産各種魚三月下旬雪始化盡昂噶拉河氷始解四月上旬柏梅兒湖氷始解草始萌樹始發自此乘舟起程由昂噶拉河過破落克西費喇諸危險之處其昂噶拉河兩岸竒巒絶壁叠翠橫空斷岸千尺水聲淙淙巉石嵯峨橫波峭立風髙浪激奔注如矢昻噶拉河自柏海兒湖流出向西北繞過厄爾口城仍向西北而流滙於伊聶謝河歸入北海水清溜急大於色楞格河兩岸皆山有髙峻峯巒亦有平坂山岡多林藪有杉松馬尾松楊樺櫻薁刺玫岸有叢桞行千餘里水漸濁厄爾口河自厄爾口城之處歸入又行一千九百餘里伊里穆河自東北歸入自伊里穆河歸入之處以至伊聶謝河其間之河俄羅斯又呼為通古斯科河除厄爾口河伊里穆河又有十餘小河皆歸入昂噶拉河昂噶拉河內有碑克五處破落克八處西費喇九處河內髙峯及臨水懸崖俄羅斯人名之曰碑克河兩邉皆峭壁中有大石水直陡下流者俄羅斯人名之曰破落克水淺有石水緊溜急之處俄羅斯人名之曰西費喇五月初四日自厄爾口城乘船起程沿途河岸之下未消之冰雪尚有二三尺不等亦有至丈餘之處順流晝夜行十九日至伊聶謝柏興地方其間水程三千餘里沿途河岸寬濶之處間有田畝其山陂少平之處亦有耕種者有小柏興甚稀俄羅斯與布喇特及索倫人等雜處五碑克之名滅提别西克碑克巴達爾滿斯克碑克多達爾斯克碑克滅費斯克碑克費達穆斯克碑克八破落克之名博合滅爾訥破落克皮牙乃破落克巴敦破落克多爾規破落克沙滿斯克破落克阿布林斯克破落克木爾蘇斯克破落克四鐡烈洛什破落克九西費喇之名鄂標穆索斯奈西費喇洛什西費喇柏格西費喇郭洛活瓦西費喇郭費殷斯克西費喇噶什那西費喇鄂費夏那西費喇鄂爾吉那西費喇郭薩牙西費喇由昻噶拉河水行十九日於五月二十三日至伊聶謝柏興地方管柏興官阿列克散忒爾色敏訥委翅人名排兵列幟鳴炮放鎗鼓吹迎接自此前往有陸路三日因馬匹未齊住候五日管柏興官阿列克散忒爾色敏訥委翅來見遂請筵宴於我四人處各送貂皮二張白狐皮十張及猪酒俱却不受阿列克散忒爾色敏訥委翅曰中國之人自古未到我國地方今幸遇中國至聖大皇帝遣天使大人至此不知作何敬奉欽敬之心甚切但不得美品此係我一㸃微誠敬儀望乞辱納我等言俱各䝉至聖大皇帝恩賜而來一應用度之物俱已全偹途中有察罕汗供給等項用之不竭頭目所餽禮物理宜相受但我國凡奉君命差遣一切餽送禮物毫不敢受因其遣人再三懇乞只留猪酒却其貂狐皮張酬縀四匹二十九日撥給馬匹自伊聶謝柏興地方起程亦排兵列幟鳴炮鼓吹而送伊聶謝柏興在厄爾口城之西北其間水程三千餘里陸路一月程川谷寬濶四面皆山岡伊聶謝河自南流來大於昻噶拉河其昻噶拉河來自東南離柏興十餘里歸入伊聶謝河又繞過柏興向東北流入北海無城郭居住千有餘户俱俄羅斯有天主堂八座有市㕓設管轄柏興頭目一員斯多爾尼科阿列克散忒爾色敏訥委翅駐兵八百名其居住廬舍生計種植牲畜等項與厄爾口城同俄儸斯呼索倫為喀穆尼漢又呼為通古斯俱畜鹿以供乘馭馱載其鹿灰白色形似驢騾有角名曰俄倫林藪之內有鶡雞北地最寒有一種獸行地內遇陽氣即死身大重萬斤骨色甚白潤類象牙質柔不甚傷損每於河濵土內得之俄儸斯獲其骨製碗碟梳篦用之肉性最寒人食之可除煩熱梵名麻門槖􅹄華名磎鼠此地相去北海大洋一月程時夏至前後夜不甚暗雖日落夜深猶可博奕不數刻東方即曙而日出矣因候辦供給住二日偹辦馬匹停妥行李載於車內官兵護送過麻科佛斯科嶺途中住一宿于閏五月初二日至麻科斯科村落之揭的河岸駐扎麻科佛斯科嶺在伊聶謝西北二十里外烏斯乞木地方下船陸行山不甚大沿途俱林藪有果松馬尾松杉松楊樺栁櫻薁刺玫地甚泥濘多蚊虻其間有小柏興兩三處溪河四五道産熊狼堪逹韓狐狸銀鼠灰鼠麻科斯科在伊聶謝之西北相去二百五十餘里皆山路揭的河來自東南繞過麻科斯科向西北而流柏興內有廬舍四十餘間俱俄羅斯居住有天主堂一座其河內有寬一丈長七丈許船二十餘隻舟艇甚多由水路之人俱於此處登舟赴托波兒城在揭的河岸駐扎候彼預偹船隻供給之時伊里穆城頭目喇法斂帖人名帶領被虜西洋將軍牙那爾等來謁見我等衣冠用度齊楚不勝仰慕叩頭獻酒而去初五日一切船隻供給完偹自揭河登舟起行揭的河自麻科佛斯科佛落克嶺發源環流麻科斯科向西北而流至那里穆柏興附近歸入鄂布河寬六七丈不等多灣曲水色赤蚊虻甚多沿河有小柏興四五處俱俄儸斯居住其地平坦水窪處甚多皆林藪有馬尾松果松杉松楊樺栁櫻薁刺玫河崖下土燕之巢穴甚多産熊貂鼠狐狸銀鼠灰鼠有一種人類乎索倫名曰鄂斯提牙斯科在揭的河兩岸林木內散處捕貂作貢順流無晝夜行十一日河靣遂寬林木漸稀河內水色漸白蚊虻亦少再行一日至那里穆柏興揭的河歸入鄂布河其間水程二千五百餘里一種魚形類鱘魚口似鮰無鱗脊上並兩肋有骨三條連生肉味同于鮰魚大者不過三尺俄羅斯名之曰四帖里烈帖䝉古人名之曰舒里於未凍河之前從北海由鄂布河遡流而來甚多人皆漁捕曝乾為食亦貨賣自麻科斯科村登舟由揭的河順流而行此間經羅新訥牙爾及茄斯科村落出揭的河入鄂布河行一日於十六日至那里穆柏與管柏興官雅果付人名排列旗幟兵丁迎接請至伊家作樂筵宴因將京都帶去果品並粳米老米遣人酬送管柏興官父子甚喜叩頭致謝起程之日送十餘里辭歸河內水靣白蛾甚多或飛樹上或浮水靣似栁絮乘風楊花鋪地那里穆柏興在麻科斯科之西北其間水程二千五百餘里鄂布河自南流來過柏興向西北而流大於伊聶謝河揭的河來自東南流至柏興附近歸入鄂布河居住四五十户俱俄羅斯有天主堂二座設管轄柏興頭目一員名雅果付衣宛薩委翅無兵從此處由鄂布河順流而下行五日於二十四日至蘇爾呼忒柏興起程之次日忽颶風大作波濤洶湧舟楫傾欹上下浮沉俄羅斯人操舟不似中國人諳練幾至於危殆幸得傍岸避入小河衆心始安去柏興尚逺管柏興官出迎請至伊宅設宴欵待出十數活銀鼠視之鼓西洋琴以獻蘇爾呼忒廬舍回祿尚未修葺無可歇公署居舟中越二宿於二十七日自蘇爾呼忒起程管柏興官駕舟逺送辭歸順流乘風揚帆而行兩日行六百餘里於二十九日至薩馬爾斯科蘇爾呼忒柏興在那里穆柏興之西北其間由鄂布河舟行水程一千四百餘里其鄂布河來自東南流過柏興向西南與厄爾齊斯河合流復向西北流入北海大于伊聶謝河水濁溜緩水漲四溢洲渚甚多沿河兩岸地勢平坦皆林木有杉松楊樺櫻薁河邊多叢栁有一種鄂斯提牙斯科人在林內散處河之北岸向有柏興廬舍居二百餘户天主堂三座因失火燒毁少半新結廬舍居住餘皆穴處俱俄羅斯設管轄柏興頭目一員駐兵百名至薩馬爾斯科之日管柏興官濟爾果爾人名逺來迎接請至伊家欵宴出其妻子獻酒又請㑹同射的六月十六日差俄羅斯人往托波兒城通報大國使臣已到緣由自此處由厄爾齊斯河遡流而行俱塔塔拉之人挽縴越六宿于二十二日至狄穆演斯科薩馬爾斯科在蘇爾呼忒柏興西南其間水程六百餘里厄爾齊斯河自南流來繞過柏興向西北流二十餘里歸入鄂布河其河東岸之上有土山不甚大有杉松楊樹河邊有叢栁山麓一帶有廬舍百餘間居五十餘户皆俄羅斯有天主堂一座設管理驛站船隻頭目一員無兵以上三處林木甚多係水窪地方無耕種田畝俱從托波兒托穆斯科等處挽運麥石而食其廬舍生計牲畜等項與厄爾口城伊聶謝柏興同在狄穆演斯科修理船舵損壞之處並俟供給止二宿閒暇時管柏興官濟爾果爾相約射的為娛二十五日濟爾果爾乘船相伴同赴托波兒城狄穆演斯科在薩馬爾斯科之西南由厄爾齊斯河遡流而上相去六百餘里厄爾齊斯河來自西南向東北而流水濁溜急其大如色楞格河自薩馬爾斯科至狄穆演斯科沿河一帶東岸之上皆土山平坂有杉松楊樺櫻薁等樹甚密河邊皆叢栁兩岸有小柏興十餘處間有田畝俄羅斯與鄂斯提牙斯科並搭搭拉人雜處其河東岸土山之上有廬舍百餘間居五十餘戶皆俄羅斯柏興之四靣皆田畝有天主堂一座其柏興事務係薩爾馬斯科頭目兼管無兵一種草果俄羅斯名之曰馬里那䝉古人名之曰和尼柏兒濟爾根形似桑椹色赤味甘酸幹不盈尺其厄爾齊斯河岸之山內甚多柏興各處小兒鬻賣於七月初四日至托波兒地方噶噶林馬提飛費多爾委翅人名遣所屬俄羅斯官衣宛阿法那西委翅人名迎接問候自河岸至公署排兵列幟諭㫖前排列數對兵丁導引送至公署噶噶林執手叩請中國至聖大皇帝萬安於是我等問察罕汗起居互相叙寒溫坐畢噶噶林曰兩國相和議之後我國人民不時往中國貿易屢沾至聖大皇帝深恩有年中國人並不曽一至我國地方今天使大人此來有何事故或有干預我國之事我等答曰我至聖大皇帝其仁如天視萬國猶一家保萬民如赤子是以普天率土莫不畏威懷德來享來王其遣使進貢朝覲者甚衆我大皇帝無論逺近內外俱一體加恩愛恤不止爾俄羅斯一國我等此來因土爾扈特國阿玉竒汗特遣使往中國恭請大皇帝萬安貢進方物之人由爾國經過爾國遣人轉送至中國所以我大皇帝敕諭我國大臣傳詢爾國前往貿易之商人科密薩爾言沿途馬匹供應不致違誤是以我大皇帝亦由此路遣我等前往阿玉竒汗處頒發諭㫖恩賞於爾國無事但我等來時我大部交付有俄羅斯國商人科密薩爾乞請行俄羅斯佛教番僧在京師者止有米提理一人年已老邁倘有不測則行我俄羅斯佛教之人必致斷絶若准我國送畨僧前來我即送來等語我國大臣轉奏䝉大皇帝恩准著送番僧前來又曽交付爾商人科密薩爾國若有外科良醫一併送來我等事竣還朝時爾國若將行教番僧外科醫士給發令我等帶去噶噶林曰是此等情節我科密薩爾俱曽告訴番僧現今在此預備醫士此處無甚良者已差往莫斯科窪城調取尚未曽到天使大人回時可以到此我等言我等奉至聖大皇帝命路經爾國往土爾扈特國阿玉竒汗處去我等此來爾國察罕汗可曽聽見否曽差人來否噶噶林曰天使大人前來之處已報知我國察罕汗我察罕汗說中國大皇帝命天使大人特往阿玉竒汗處去爾等須當欽敬護送至阿玉竒汗處一應馬匹供用不可遲悮但未曽遣人來我察罕汗不在莫斯科窪城現在軍前天使大人回來時我察罕汗欲㑹天使大人亦未可定若欲相㑹自當特遣人來不知天使大人去否我等答曰來時奉大皇帝諭㫖兩國和議已久爾等過俄羅斯國地方往阿玉竒汗處去若去來之際察罕汗得知差人邀㑹詢問地理情形爾等分一半人往察罕汗處去一半人往阿玉竒汗處去若請爾等全去即著前往及爾國商人科密薩爾在京師時亦曽有諭㫖爾國人民雖每嵗前來貿易俱係平素商賈察罕汗並未特遣人進貢所以朕亦不曽遣使此所遣使者是往阿玉竒汗處去的爾察罕汗如欲相㑹詢問地理情形著其中一半人前往相見噶噶林曰如此天使大人可曽帶得印文來否我察罕汗欲㑹天使特差人來請亦未可定彼時天使不可食言我等答曰不曽帶甚文書來爾察罕汗必欲相㑹差人前來我等即前往相㑹有何食言之處我等向噶噶林言爾國所屬之泥布楚城居住之庫似克等共十口越境之中國地方伐木打牲被我巡邏兵役拿獲理應遵定邉界和議之欵治罪我大皇帝仁慈寬大姑宥其罪其寬免情由曽有文書交與商人科密薩爾帶來使爾知㑹爾察罕汗此文書曽到否噶噶林曰文書已到業已差人禀知我察罕汗去了其回信尚未曽到我從前在泥布楚城作頭目時似此等私行越境人亦有割耳鼻者亦有砍手者大辟者越一日特遣官前來請㑹於是前往噶噶林問曰中國大皇帝天縱至聖國家享承平已久天使大人受皇帝恩澤享用安逸我等答曰大皇帝至聖至神以仁孝治天下以忠義勵臣僚國無重刑不嗜殺戮無間遐邇一體同仁山陬海隅罔不沾恩被澤薄海人民皆中心感戴所以國家雍熙雨暘時若人夀年豐宇內咸享升平之福我等世戴大皇帝深恩今幸際盛世不但我等身沐皇恩受享安逸即舉家老幼妻子無不沾我大皇帝厚澤安居樂業我大皇帝聖恩髙厚不能枚舉即我等安享樂業之處亦難殫述噶噶林曰誠然中國大皇帝至聖至神舉國殷富四方寧謐天使大人等俱安享樂業聞之已久我先察罕汗在時國家無事上下相安先察罕汗喜射獵好鷹犬當時臣宰俱享安逸二十年來我國兵甲之事全無休息至今猶征戰不但我俄羅斯國觀天下諸國沙漳汗空科爾汗式費耶忒國厄納特赫國哈薩克國哈拉哈兒叭國策旺拉布坦阿玉竒等國皆互相爭鬬獨中國甚至寧謐目今察罕汗幼稚時最喜與兒童為戰鬬戲從前同戲諸兒今皆作將軍若似乃父行事我等亦可受享安逸矣爾中國寧謐宇內無事大皇帝亦射獵否亦養鷹犬否我等答曰我至聖大皇帝聖神文武法天行健每於萬幾餘暇古來經傳史冊無不經覽天文地理律吕數術無不貫通又天縱神武常親騎射以教習臣庶不時圍獵奬勵文武而訓練兵將凡扈從士卒俱按日官給盤費又給與官馬乘騎雖今日下令明早起行亦無些毫遲誤一應俱係大皇帝恩賞我等隻身效力毫無拮据大皇帝亦養海東青鴉虎鷹犬海東青有雪白者有蘆花者有本色者單放野雞俱係過時捕得無窩雛惟鷹有窩雛亦有捕得者亦放野雞亦捉走兔犬內有捉虎狼鹿狍者有捉狐兔者至於水禽雁鴨俱放鴉虎按時放捉聞爾國有窩雛海青可取來一觀噶噶林曰我等亦養海青亦係捕捉方得並無窩雛不知在何處結巢隨將所養本色海青及一草白犬出視曰天使大人此來河路迢遙最屬險惡途中勞苦一切馬匹供應可有遲悮否中國亦有如此河路否我等答曰我中國似此等大河亦有更有大於此者名為長江我等來時沿途官員甚是欽敬迎接官博爾果付泥克甚是勤慎爾國察罕汗供給豐裕不可勝用馬匹船隻並無遲悮是以我等不勞而至噶噶林曰聞得土爾扈特國貝子阿拉布珠兒之四人天使大人帶來其阿拉布珠兒是何人將他四人帶來是何情由我等答曰阿拉布珠兒係阿玉奇汗之姪十年前同乃母往西藏謁見達賴喇嘛其間策旺拉布坦與阿玉竒汗不睦所以阿拉布珠兒不能歸其原籍窮迫至極故此投往中國我大皇帝仁育萬方務使天下人民無一夫不得其所所以將阿拉布珠兒封為貝子於嘉峪關外黨色爾騰地方安置每嵗賞給俸銀縀匹生畜今甚殷實去嵗阿玉竒汗特遣使恭請我至聖大皇帝萬安貢進方物因此遣我等頒發諭㫖並錫恩賞之便將阿拉布珠兒四人帶去見乃父那咂爾麻木令其知阿拉布珠兒䝉我大皇帝深恩其身依然無恙耳一日有俄羅斯國官衣宛阿法那西委翅者來見問曰中國大臣內何等品級方為尊爵我等答曰我中國親王郡王貝勒貝子國公俱係室室天潢一𣲖其公臣子孫有世襲公候伯者內有領侍衛內大臣大學士外有尚書都統前鋒統領護軍統領外省有將軍總督此皆係頭等品級大臣衣宛阿法那西委翅曰我俄羅斯察罕汗侍近有大臣四員一應事務不用通知國王即可専擅行事中國亦有此等臣宰否適間天使大人所言大臣內何等最尊我等答曰我中國並無如此専擅行事之臣宰事無大小皆具題請㫖恭候上裁臣宰欽遵施行不敢専擅行事大臣內領侍衛內大臣六位大學士六位最尊無過於此者衣宛阿法那西委翅曰我俄羅斯國若有大事㑹議我汗亦前往公同㑹議中國有事㑹議大皇帝亦往同議否我等答曰國家倘有議政要務有王貝勒大臣㑹同議定奏聞皆聼皇上裁奪我國大皇帝無前往同議之理衣宛阿法那西委翅曰天使大人看來我國噶噶林於中國何等臣宰相似我等言看來類同我中國尚書總督衣宛阿法那西委翅曰我國之噶噶林與中國領侍衛內大臣相似嗣後天使大人將噶噶林不可呼為尚書但稱大臣可也欲以縀十二匹差人送與噶噶林有管待飯食俄羅斯官曰差人餽送於我國禮不合天使大人親往之時帶去方可我等言此非佳物我等自中國逺來經過爾噶噶林地方備承厚意故以此相酬我中國凡以物與人並無親送之理今差人餽送於爾國禮不合若我等親身帶去又於我中國之禮有礙以此微物豈可壞兩國大體不如停止遂公議停止餽送以俄羅斯官博爾果付泥克逺接勞苦給與縀四匹又給與博爾果付泥克之副員費耶爾索付縀二匹起程前一日噶噶林差伊俄羅斯官來請曰天使大人明日起行如䝉不棄今日可來一飯否於是前往噶噶林見余所帶小刀再三顧盻不勝稱羡即解以贈之噶噶林免冠拜受起程之日特差伊俄羅斯官答送元狐皮十張余言爾總管念我係好友如此餽送理當收受但我並不曾帶得佳物相贈爾總管之物如何收受謹心領矣遂却之來使遣人回覆噶噶林復又差人再三叩懇余言我中國凡奉君命差遣一切物件毫不敢收將皮張拿回向爾總管為我道謝賜與來使玻璃碗二件在托波兒地方住八日於十二日自托波兒起程仍𣲖原接俄羅斯官博爾果付泥克四鐡班訥委翅撥護送兵六十名小心防護送至阿玉竒汗處一併同回又差伊所屬俄羅斯官等送二十餘里方回托波兒在狄穆演斯科之西南其間遡流行六百餘里厄爾齊斯河來自東南繞過托波兒向東北而流托波兒河來自西南於托波兒相對地方歸入厄爾齊斯河沿河兩岸地勢平坦有杉松楊樺櫻薁叢柳小柏興五十餘處左近皆田畝托波兒以北二十餘里河東岸之上有小土山極平坦無城郭居千餘戶其廬舍皆大木營治有磚造廟宇二所理事公署木房數間其山麓及河岸一帶居二千餘戶其廬舍亦皆係大木營治有市廛天主堂二十餘座駐兵二千餘名有頭目十數員其西畢爾斯科省城堡及柏興地方頭目兵丁俱屬噶噶林馬提飛費多爾委翅統轄器用有床桌椅凳車拖床船舟艇樂有鐘鼓喇叭木笛嗩呐銅弦筝胡琴種大麥蕎麥油麥麻産蔓菁白菜王瓜芫荽倭瓜葱蒜畜馬牛羊猪鵝鴨雞犬猫有一種人俄羅斯名之曰搭搭拉在厄爾齊斯河沿岸及托波兒並喀山一帶居住詢其來厯俄羅斯人曰原係庫程汗之人又名貨通其托波兒等處地方歸併我國之後將伊等散處於阿兒台山後沿厄爾齊斯河一帶及托波兒並喀山等地方其中有歸入我教者有不曾歸入我教者看其未入俄羅斯教之人貌似回子俱削髮戴小帽不食猪肉别供佛像俄羅斯國地方分為八道俱設立噶噶林馬提飛費多爾委翅等總管八員分轄每道所管城堡十餘處二十餘處不等自托波兒以東至泥布楚地方名曰西畢爾斯科其七道曰喀山斯科曰佛羅尼使斯科曰計由斯科曰司馬連斯科曰三柯忒撇忒爾斯科曰郭羅多阿爾哈連斯科曰莫斯科窪斯科於稼穯之人量其收穫之多寡什一而稅于布喇忒索倫鄂斯提牙斯科兀良海齊爾給斯等打牲人令其交納貂鼠狐狸銀鼠灰鼠皮張不打牲之布喇忒索倫等人每嵗人各納銀錢二百文其兵丁每嵗有食千錢者亦有食七百文者不等錢之外又給與麥麵食鹽衣帽五年一次官給更換原以千步為一里後改為五百步其相見禮儀吉凶等事及飲饌生計大約皆同自厄爾齊斯河向西南入托波兒河遡流越九宿於二十三日至圖敏途中皆搭搭拉之人挽縴岸傍林木叢密無縴路俱行泥水之中兩足肌膚破損血水淋漓俄羅斯兵丁猶加笞楚催促余不忍視呵責方止到彼之日管柏興官排列旗幟兵丁迎接請至伊家欵宴復餽送食物候供給止宿之日有俄羅斯出征虜來之式費耶忒國數人來舟中鼓吹絃歌以為娛賞以銀錢肉食二十五日起程鴉班沁在圖敏之西北由土拉河遡流舟行五百餘里沿河兩岸有杉松楊樺叢柳甚稀有小柏興二十餘處柏興附近俱種田畝俄羅斯與搭搭拉雜處土拉河之西岸有柏興廬舍居二百餘户俱俄羅斯有天主堂三座設管轄柏興頭目二員無兵從此捨舟陸行異域録卷上
